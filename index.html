<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>视频时间水印工具 - 完整版 (裁剪+水印+录制)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #b8e1fc, #d4f1f9);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        .panel {
            background: rgba(245, 250, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(100, 180, 250, 0.5);
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0, 80, 120, 0.2);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 18px 24px;
            background: linear-gradient(135deg, rgba(100, 180, 250, 0.25), rgba(150, 200, 255, 0.15));
            border-bottom: 1px solid rgba(70, 150, 230, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1.35rem;
            color: #1a6ea8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-buttons {
            display: flex;
            gap: 8px;
        }
        .btn-tiny {
            background: rgba(45, 140, 255, 0.15);
            border: 1px solid rgba(45, 140, 255, 0.5);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            color: #1a6ea8;
            transition: all 0.2s;
        }
        .btn-tiny:hover {
            background: rgba(45, 140, 255, 0.3);
            transform: translateY(-1px);
        }

        .panel-content {
            padding: 20px 24px;
            flex: 1;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 2px solid #4a9eff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #watermarkCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .crop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: crosshair;
        }
        .crop-box {
            position: absolute;
            border: 3px solid #2d8cff;
            background: rgba(45, 140, 255, 0.15);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
            cursor: move;
            transition: none;
        }
        .crop-box .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #2d8cff;
            border: 2px solid white;
            border-radius: 2px;
            z-index: 20;
        }
        .resize-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .resize-handle.n { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
        .resize-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .resize-handle.w { top: 50%; left: -6px; transform: translateY(-50%); cursor: w-resize; }
        .resize-handle.e { top: 50%; right: -6px; transform: translateY(-50%); cursor: e-resize; }
        .resize-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .resize-handle.s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
        .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
        .crop-info {
            position: absolute;
            bottom: 8px;
            right: 12px;
            background: rgba(0,0,0,0.75);
            color: #2d8cff;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 15;
            pointer-events: none;
            font-family: monospace;
        }
        .crop-toolbar {
            position: absolute;
            bottom: 12px;
            left: 12px;
            z-index: 15;
            display: flex;
            gap: 8px;
        }
        .crop-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #2d8cff;
            color: #2d8cff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .crop-btn:hover {
            background: #2d8cff;
            color: white;
        }
        .crop-active-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #2d8cffcc;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            z-index: 15;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .preview-modal.active { display: flex; }
        .preview-container {
            position: relative;
            width: 90vw;
            height: 90vh;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #4a9eff;
        }
        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .preview-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

            right: 30px;
