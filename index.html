<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>视频时间水印工具 - 双水印版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', system-ui, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 20px;
        }

        /* 左侧视频区域 */
        .video-section {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-header {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-header h3 {
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-badge {
            background: #28a745;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .video-container {
            position: relative;
            background: #000;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            max-height: 600px;
            object-fit: contain;
        }

        .watermark-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .progress-section {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: #aaa;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .status-message {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }

        /* 右侧操作面板 */
        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            height: fit-content;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .control-panel::-webkit-scrollbar {
            width: 6px;
        }

        .control-panel::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .control-panel::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .watermark-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .watermark-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }

        .time-header {
            border-bottom-color: #667eea;
        }

        .text-header {
            border-bottom-color: #38ef7d;
        }

        .watermark-header h4 {
            font-size: 16px;
            font-weight: 600;
        }

        .time-header h4 {
            color: #667eea;
        }

        .text-header h4 {
            color: #38ef7d;
        }

        .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: #e9ecef;
            color: #666;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 13px;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        .form-group input[type="color"] {
            height: 38px;
            cursor: pointer;
            padding: 4px;
        }

        .form-group input[type="range"] {
            cursor: pointer;
            padding: 0;
        }

        .range-value {
            font-size: 11px;
            color: #667eea;
            margin-left: 8px;
        }

        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .format-hint {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            line-height: 1.4;
        }

        .format-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .format-btn {
            padding: 4px 10px;
            background: #e9ecef;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .format-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: #f0f0f0;
            color: #333;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .enable-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .enable-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .enable-checkbox label {
            margin-bottom: 0;
            cursor: pointer;
            font-size: 12px;
            font-weight: normal;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            .control-panel {
                max-height: none;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 左侧视频区域 -->
    <div class="video-section">
        <div class="video-header">
            <h3>🎥 视频预览</h3>
            <span class="live-badge">⏱️ 时间实时更新</span>
        </div>
        <div class="video-container">
            <video id="videoPlayer" controls></video>
            <canvas id="watermarkCanvas" class="watermark-canvas"></canvas>
        </div>
        <div class="progress-section" id="progressSection" style="display: none;">
            <div class="progress-info">
                <span id="recordStatus">准备就绪</span>
                <span id="recordProgress">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status-message" id="statusMsg">📁 请选择视频文件开始</div>
        </div>
    </div>

    <!-- 右侧操作面板 -->
    <div class="control-panel">
        <div class="title">
            🎬 <span>视频水印工具</span>
        </div>

        <!-- 文件和时间基准 -->
        <div class="form-group">
            <label>📹 选择视频文件</label>
            <input type="file" id="videoFile" accept="video/*">
        </div>

        <div class="form-group">
            <label>⏰ 时间起始基准</label>
            <input type="datetime-local" id="startTime" step="1">
        </div>

        <!-- ========== 时间水印设置 ========== -->
        <div class="watermark-card">
            <div class="watermark-header time-header">
                <h4>⏱️ 时间水印</h4>
                <span class="badge">动态时间</span>
            </div>
            
            <div class="enable-checkbox">
                <input type="checkbox" id="enableTimeWatermark" checked>
                <label>启用时间水印</label>
            </div>
            
            <div id="timeSettings">
                <div class="form-group">
                    <label>📝 时间格式</label>
                    <input type="text" id="timeFormat" value="{YYYY}-{MM}-{DD} {HH}:{mm}:{ss}">
                    <div class="format-buttons">
                        <span class="format-btn" data-format="{YYYY}-{MM}-{DD} {HH}:{mm}:{ss}">2023-03-03 03:03:03</span>
                        <span class="format-btn" data-format="{YYYY}年{MM}月{DD}日 {HH}:{mm}:{ss}">2023年03月03日 03:03:03</span>
                        <span class="format-btn" data-format="{YYYY}/{MM}/{DD} {HH}:{mm}:{ss}">2023/03/03 03:03:03</span>
                    </div>
                    <div class="format-hint">💡 变量: {YYYY}年 {MM}月 {DD}日 {HH}时 {mm}分 {ss}秒</div>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>字体</label>
                        <select id="timeFontFamily">
                            <option value="Arial, sans-serif">Arial</option>
                            <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
                            <option value="'PingFang SC', sans-serif">苹方</option>
                            <option value="'SimHei', sans-serif">黑体</option>
                            <option value="'KaiTi', sans-serif">楷体</option>
                            <option value="'Courier New', monospace">Courier New</option>
                            <option value="'Times New Roman', serif">Times New Roman</option>
                            <option value="'Georgia', serif">Georgia</option>
                            <option value="'Verdana', sans-serif">Verdana</option>
                            <option value="'Segoe UI', sans-serif">Segoe UI</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>大小(px)</label>
                        <input type="number" id="timeFontSize" value="48" min="12" max="120" step="1">
                    </div>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>文字颜色</label>
                        <input type="color" id="timeTextColor" value="#ffffff">
                    </div>
                    <div class="form-group">
                        <label>透明度</label>
                        <input type="range" id="timeTextOpacity" min="0" max="1" step="0.01" value="0.9">
                        <span id="timeTextOpacityValue" class="range-value">0.90</span>
                    </div>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>背景颜色</label>
                        <input type="color" id="timeBgColor" value="#000000">
                    </div>
                    <div class="form-group">
                        <label>背景透明度</label>
                        <input type="range" id="timeBgOpacity" min="0" max="1" step="0.01" value="0.5">
                        <span id="timeBgOpacityValue" class="range-value">0.50</span>
                    </div>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>水平位置</label>
                        <input type="range" id="timePosX" min="0" max="100" step="1" value="20">
                        <span id="timePosXValue" class="range-value">20%</span>
                    </div>
                    <div class="form-group">
                        <label>垂直位置</label>
                        <input type="range" id="timePosY" min="0" max="100" step="1" value="20">
                        <span id="timePosYValue" class="range-value">20%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>🔄 旋转角度</label>
                    <input type="range" id="timeRotate" min="-45" max="45" step="1" value="0">
                    <span id="timeRotateValue" class="range-value">0°</span>
                </div>
            </div>
        </div>

        <!-- ========== 自定义文字水印设置 ========== -->
        <div class="watermark-card">
            <div class="watermark-header text-header">
                <h4>📝 自定义文字水印</h4>
                <span class="badge">固定文字</span>
            </div>
            
            <div class="enable-checkbox">
                <input type="checkbox" id="enableTextWatermark">
                <label>启用自定义文字水印</label>
            </div>
            
            <div id="textSettings" style="display: none;">
                <div class="form-group">
                    <label>📝 文字内容</label>
                    <textarea id="customTextContent" rows="2" placeholder="请输入水印文字，例如：公司内部资料"></textarea>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>字体</label>
                        <select id="textFontFamily">
                            <option value="Arial, sans-serif">Arial</option>
                            <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
                            <option value="'PingFang SC', sans-serif">苹方</option>
                            <option value="'SimHei', sans-serif">黑体</option>
                            <option value="'KaiTi', sans-serif">楷体</option>
                            <option value="'Courier New', monospace">Courier New</option>
                            <option value="'Times New Roman', serif">Times New Roman</option>
                            <option value="'Georgia', serif">Georgia</option>
                            <option value="'Verdana', sans-serif">Verdana</option>
                            <option value="'Segoe UI', sans-serif">Segoe UI</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>大小(px)</label>
                        <input type="number" id="textFontSize" value="36" min="12" max="120" step="1">
                    </div>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>文字颜色</label>
                        <input type="color" id="textTextColor" value="#ffcc00">
                    </div>
                    <div class="form-group">
                        <label>透明度</label>
                        <input type="range" id="textTextOpacity" min="0" max="1" step="0.01" value="0.8">
                        <span id="textTextOpacityValue" class="range-value">0.80</span>
                    </div>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>背景颜色</label>
                        <input type="color" id="textBgColor" value="#000000">
                    </div>
                    <div class="form-group">
                        <label>背景透明度</label>
                        <input type="range" id="textBgOpacity" min="0" max="1" step="0.01" value="0.4">
                        <span id="textBgOpacityValue" class="range-value">0.40</span>
                    </div>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>水平位置</label>
                        <input type="range" id="textPosX" min="0" max="100" step="1" value="80">
                        <span id="textPosXValue" class="range-value">80%</span>
                    </div>
                    <div class="form-group">
                        <label>垂直位置</label>
                        <input type="range" id="textPosY" min="0" max="100" step="1" value="80">
                        <span id="textPosYValue" class="range-value">80%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>🔄 旋转角度</label>
                    <input type="range" id="textRotate" min="-45" max="45" step="1" value="0">
                    <span id="textRotateValue" class="range-value">0°</span>
                </div>
            </div>
        </div>

        <!-- 按钮组 -->
        <div class="button-group">
            <button class="btn btn-primary" id="previewBtn">👁️ 预览</button>
            <button class="btn btn-success" id="exportBtn" disabled>🎬 录制导出</button>
            <button class="btn btn-danger" id="stopBtn" disabled>⏹️ 停止</button>
        </div>
    </div>
</div>

<script>
    // DOM 元素
    const videoFile = document.getElementById('videoFile');
    const startTimeInput = document.getElementById('startTime');
    const videoPlayer = document.getElementById('videoPlayer');
    const watermarkCanvas = document.getElementById('watermarkCanvas');
    const progressFill = document.getElementById('progressFill');
    const recordStatus = document.getElementById('recordStatus');
    const recordProgress = document.getElementById('recordProgress');
    const statusMsg = document.getElementById('statusMsg');
    const progressSection = document.getElementById('progressSection');
    const previewBtn = document.getElementById('previewBtn');
    const exportBtn = document.getElementById('exportBtn');
    const stopBtn = document.getElementById('stopBtn');

    // 时间水印元素
    const enableTimeWatermark = document.getElementById('enableTimeWatermark');
    const timeFormat = document.getElementById('timeFormat');
    const timeFontFamily = document.getElementById('timeFontFamily');
    const timeFontSize = document.getElementById('timeFontSize');
    const timeTextColor = document.getElementById('timeTextColor');
    const timeTextOpacity = document.getElementById('timeTextOpacity');
    const timeTextOpacityValue = document.getElementById('timeTextOpacityValue');
    const timeBgColor = document.getElementById('timeBgColor');
    const timeBgOpacity = document.getElementById('timeBgOpacity');
    const timeBgOpacityValue = document.getElementById('timeBgOpacityValue');
    const timePosX = document.getElementById('timePosX');
    const timePosXValue = document.getElementById('timePosXValue');
    const timePosY = document.getElementById('timePosY');
    const timePosYValue = document.getElementById('timePosYValue');
    const timeRotate = document.getElementById('timeRotate');
    const timeRotateValue = document.getElementById('timeRotateValue');

    // 自定义文字水印元素
    const enableTextWatermark = document.getElementById('enableTextWatermark');
    const textSettings = document.getElementById('textSettings');
    const customTextContent = document.getElementById('customTextContent');
    const textFontFamily = document.getElementById('textFontFamily');
    const textFontSize = document.getElementById('textFontSize');
    const textTextColor = document.getElementById('textTextColor');
    const textTextOpacity = document.getElementById('textTextOpacity');
    const textTextOpacityValue = document.getElementById('textTextOpacityValue');
    const textBgColor = document.getElementById('textBgColor');
    const textBgOpacity = document.getElementById('textBgOpacity');
    const textBgOpacityValue = document.getElementById('textBgOpacityValue');
    const textPosX = document.getElementById('textPosX');
    const textPosXValue = document.getElementById('textPosXValue');
    const textPosY = document.getElementById('textPosY');
    const textPosYValue = document.getElementById('textPosYValue');
    const textRotate = document.getElementById('textRotate');
    const textRotateValue = document.getElementById('textRotateValue');

    // 格式按钮
    const formatBtns = document.querySelectorAll('.format-btn');

    let startDate = new Date();
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let animationFrameId = null;
    let audioContext = null;
    let mediaStreamSource = null;
    let canvasStream = null;

    // 初始化时间选择器
    function initDateTimePicker() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hour = String(now.getHours()).padStart(2, '0');
        const minute = String(now.getMinutes()).padStart(2, '0');
        const second = String(now.getSeconds()).padStart(2, '0');
        startTimeInput.value = `${year}-${month}-${day}T${hour}:${minute}:${second}`;
        startDate = new Date(startTimeInput.value);
    }

    // 格式化时间
    function formatTime(date, format) {
        const YYYY = date.getFullYear();
        const MM = String(date.getMonth() + 1).padStart(2, '0');
        const DD = String(date.getDate()).padStart(2, '0');
        const HH = String(date.getHours()).padStart(2, '0');
        const mm = String(date.getMinutes()).padStart(2, '0');
        const ss = String(date.getSeconds()).padStart(2, '0');
        
        let result = format;
        result = result.replace(/{YYYY}/g, YYYY);
        result = result.replace(/{MM}/g, MM);
        result = result.replace(/{DD}/g, DD);
        result = result.replace(/{HH}/g, HH);
        result = result.replace(/{mm}/g, mm);
        result = result.replace(/{ss}/g, ss);
        
        return result;
    }

    // 获取当前时间
    function getCurrentTime(videoCurrentTime) {
        const elapsedSeconds = videoCurrentTime;
        return new Date(startDate.getTime() + elapsedSeconds * 1000);
    }

    // 绘制单个水印
    function drawSingleWatermark(ctx, canvas, videoCurrentTime, config) {
        if (!config.enabled) return;
        
        let text = config.getText ? config.getText(videoCurrentTime) : config.text;
        if (!text) return;
        
        const fontSizeValue = parseInt(config.fontSize);
        const fontFamilyValue = config.fontFamily;
        const textColorValue = config.textColor;
        const bgColorValue = config.bgColor;
        const bgOpacityValueNum = parseFloat(config.bgOpacity);
        const textOpacityValueNum = parseFloat(config.textOpacity);
        const posXValueNum = parseFloat(config.posX) / 100;
        const posYValueNum = parseFloat(config.posY) / 100;
        const rotateValueNum = parseFloat(config.rotate);
        
        ctx.save();
        
        ctx.font = `${fontSizeValue}px ${fontFamilyValue}`;
        const textMetrics = ctx.measureText(text);
        const textWidth = textMetrics.width;
        const textHeight = fontSizeValue;
        
        const x = (canvas.width - textWidth) * posXValueNum;
        const y = (canvas.height + textHeight / 2) * posYValueNum;
        
        ctx.translate(x + textWidth / 2, y - textHeight / 2);
        ctx.rotate(rotateValueNum * Math.PI / 180);
        
        if (bgColorValue && bgOpacityValueNum > 0) {
            ctx.fillStyle = bgColorValue;
            ctx.globalAlpha = bgOpacityValueNum;
            ctx.fillRect(-textWidth / 2 - 10, -textHeight / 2 - 5, textWidth + 20, textHeight + 10);
        }
        
        ctx.fillStyle = textColorValue;
        ctx.globalAlpha = textOpacityValueNum;
        ctx.font = `${fontSizeValue}px ${fontFamilyValue}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 0, 0);
        
        ctx.restore();
    }

    // 获取时间水印配置
    function getTimeWatermarkConfig() {
        return {
            enabled: enableTimeWatermark.checked,
            fontSize: timeFontSize.value,
            fontFamily: timeFontFamily.value,
            textColor: timeTextColor.value,
            textOpacity: timeTextOpacity.value,
            bgColor: timeBgColor.value,
            bgOpacity: timeBgOpacity.value,
            posX: timePosX.value,
            posY: timePosY.value,
            rotate: timeRotate.value,
            getText: (videoCurrentTime) => {
                const currentTime = getCurrentTime(videoCurrentTime);
                return formatTime(currentTime, timeFormat.value);
            }
        };
    }

    // 获取文字水印配置
    function getTextWatermarkConfig() {
        return {
            enabled: enableTextWatermark.checked,
            text: customTextContent.value,
            fontSize: textFontSize.value,
            fontFamily: textFontFamily.value,
            textColor: textTextColor.value,
            textOpacity: textTextOpacity.value,
            bgColor: textBgColor.value,
            bgOpacity: textBgOpacity.value,
            posX: textPosX.value,
            posY: textPosY.value,
            rotate: textRotate.value
        };
    }

    // 绘制所有水印
    function drawAllWatermarks(ctx, canvas, videoCurrentTime) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 绘制时间水印
        const timeConfig = getTimeWatermarkConfig();
        drawSingleWatermark(ctx, canvas, videoCurrentTime, timeConfig);
        
        // 绘制自定义文字水印
        const textConfig = getTextWatermarkConfig();
        drawSingleWatermark(ctx, canvas, videoCurrentTime, textConfig);
    }

    // 更新预览水印
    function updatePreviewWatermark() {
        if (!videoPlayer.videoWidth || !videoPlayer.videoHeight) return;
        
        watermarkCanvas.width = videoPlayer.videoWidth;
        watermarkCanvas.height = videoPlayer.videoHeight;
        
        const ctx = watermarkCanvas.getContext('2d');
        drawAllWatermarks(ctx, watermarkCanvas, videoPlayer.currentTime);
    }

    // 预览水印
    function previewWatermark() {
        updatePreviewWatermark();
        statusMsg.innerHTML = '✅ 水印已更新';
        setTimeout(() => {
            if (statusMsg.innerHTML === '✅ 水印已更新') {
                statusMsg.innerHTML = '就绪';
            }
        }, 2000);
    }

    // 开始录制 - 优化版本，兼容所有播放器
    async function startRecording() {
        if (!videoPlayer.videoWidth || !videoPlayer.videoHeight) {
            statusMsg.innerHTML = '⚠️ 请先选择视频文件';
            return;
        }
        
        if (isRecording) {
            statusMsg.innerHTML = '⚠️ 正在录制中...';
            return;
        }
        
        try {
            // 创建录制用的canvas
            const captureCanvas = document.createElement('canvas');
            captureCanvas.width = videoPlayer.videoWidth;
            captureCanvas.height = videoPlayer.videoHeight;
            const ctx = captureCanvas.getContext('2d');
            
            // 重置视频到开始位置
            videoPlayer.currentTime = 0;
            
            // 等待视频准备好
            await new Promise(resolve => {
                if (videoPlayer.readyState >= 2) resolve();
                else videoPlayer.addEventListener('canplay', resolve, { once: true });
            });
            
            // 创建canvas流，使用更高的帧率保证流畅
            canvasStream = captureCanvas.captureStream(30);
            
            // 处理音频
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            
            mediaStreamSource = audioContext.createMediaElementSource(videoPlayer);
            const destination = audioContext.createMediaStreamDestination();
            mediaStreamSource.connect(destination);
            mediaStreamSource.connect(audioContext.destination);
            
            // 合并视频和音频流
            const finalStream = new MediaStream();
            canvasStream.getVideoTracks().forEach(track => finalStream.addTrack(track));
            destination.stream.getAudioTracks().forEach(track => finalStream.addTrack(track));
            
            recordedChunks = [];
            
            // 使用更兼容的MIME类型
            let mimeType = '';
            if (MediaRecorder.isTypeSupported('video/mp4;codecs=h264,opus')) {
                mimeType = 'video/mp4;codecs=h264,opus';
            } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')) {
                mimeType = 'video/webm;codecs=vp9,opus';
            } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')) {
                mimeType = 'video/webm;codecs=vp8,opus';
            } else {
                mimeType = 'video/webm';
            }
            
            mediaRecorder = new MediaRecorder(finalStream, {
                mimeType: mimeType,
                videoBitsPerSecond: 8000000,  // 8 Mbps，提高画质
                audioBitsPerSecond: 128000
            });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                // 创建Blob，使用更兼容的类型
                const blob = new Blob(recordedChunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const now = new Date();
                const timestamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
                
                // 根据编码格式决定文件扩展名
                const extension = mimeType.includes('mp4') ? 'mp4' : 'webm';
                a.download = `watermark_${timestamp}.${extension}`;
                a.href = url;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                // 延迟释放URL
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                }, 1000);
                
                isRecording = false;
                exportBtn.disabled = false;
                stopBtn.disabled = true;
                previewBtn.disabled = false;
                
                if (videoPlayer.paused === false) {
                    videoPlayer.pause();
                }
                
                progressFill.style.width = '0%';
                recordStatus.innerHTML = '录制完成';
                recordProgress.innerHTML = '0%';
                statusMsg.innerHTML = `✅ 导出完成！文件格式: ${extension.toUpperCase()}`;
                
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
                
                if (canvasStream) {
                    canvasStream.getTracks().forEach(track => track.stop());
                    canvasStream = null;
                }
                
                if (audioContext) {
                    audioContext.close().catch(console.error);
                    audioContext = null;
                }
                
                setTimeout(() => {
                    if (statusMsg.innerHTML.includes('导出完成')) {
                        statusMsg.innerHTML = '就绪';
                        recordStatus.innerHTML = '准备就绪';
                    }
                }, 3000);
            };
            
            mediaRecorder.onerror = (event) => {
                console.error('录制错误:', event);
                statusMsg.innerHTML = '❌ 录制发生错误，请重试';
                isRecording = false;
                exportBtn.disabled = false;
                stopBtn.disabled = true;
                previewBtn.disabled = false;
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
            };
            
            // 开始播放视频
            await videoPlayer.play();
            
            // 开始录制
            mediaRecorder.start(1000); // 每秒收集一次数据
            isRecording = true;
            exportBtn.disabled = true;
            stopBtn.disabled = false;
            previewBtn.disabled = true;
            progressSection.style.display = 'block';
            statusMsg.innerHTML = '🎬 录制中... 请勿关闭页面';
            recordStatus.innerHTML = '录制中';
            
            // 动画循环：绘制每一帧
            let lastTimestamp = 0;
            function drawFrame(timestamp) {
                if (!isRecording) return;
                
                if (!videoPlayer.paused && !videoPlayer.ended && videoPlayer.duration > 0) {
                    // 绘制视频帧
                    ctx.drawImage(videoPlayer, 0, 0, captureCanvas.width, captureCanvas.height);
                    // 绘制水印
                    drawAllWatermarks(ctx, captureCanvas, videoPlayer.currentTime);
                    
                    // 更新进度
                    const progress = (videoPlayer.currentTime / videoPlayer.duration) * 100;
                    progressFill.style.width = `${progress}%`;
                    recordProgress.innerHTML = `${Math.floor(progress)}%`;
                    
                    if (videoPlayer.currentTime >= videoPlayer.duration - 0.05) {
                        // 视频结束，停止录制
                        setTimeout(() => stopRecording(), 200);
                        return;
                    }
                }
                
                animationFrameId = requestAnimationFrame(drawFrame);
            }
            
            animationFrameId = requestAnimationFrame(drawFrame);
            
        } catch (error) {
            console.error('录制失败:', error);
            statusMsg.innerHTML = '❌ 录制失败: ' + error.message;
            isRecording = false;
            exportBtn.disabled = false;
            stopBtn.disabled = true;
            previewBtn.disabled = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (canvasStream) {
                canvasStream.getTracks().forEach(track => track.stop());
                canvasStream = null;
            }
        }
    }
    
    // 停止录制
    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            isRecording = false;
            recordStatus.innerHTML = '停止中，正在保存...';
        }
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
        }
    }
    
    // 视频事件
    videoPlayer.addEventListener('loadedmetadata', () => {
        watermarkCanvas.width = videoPlayer.videoWidth;
        watermarkCanvas.height = videoPlayer.videoHeight;
        updatePreviewWatermark();
        exportBtn.disabled = false;
        statusMsg.innerHTML = '✅ 视频已加载，可以开始录制';
    });
    
    videoPlayer.addEventListener('timeupdate', () => {
        if (!isRecording) {
            updatePreviewWatermark();
        }
    });
    
    videoPlayer.addEventListener('ended', () => {
        if (isRecording) stopRecording();
    });
    
    // 按钮事件
    previewBtn.addEventListener('click', () => {
        if (videoPlayer.videoWidth) previewWatermark();
        else statusMsg.innerHTML = '⚠️ 请先选择视频文件';
    });
    
    exportBtn.addEventListener('click', startRecording);
    stopBtn.addEventListener('click', stopRecording);
    
    // 文件选择
    videoFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            videoPlayer.src = url;
            videoPlayer.load();
            statusMsg.innerHTML = '📹 加载中...';
            exportBtn.disabled = true;
            if (isRecording) stopRecording();
            if (audioContext) {
                audioContext.close().catch(console.error);
                audioContext = null;
            }
            if (canvasStream) {
                canvasStream.getTracks().forEach(track => track.stop());
                canvasStream = null;
            }
        }
    });
    
    // 格式按钮点击事件
    formatBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const format = btn.dataset.format;
            if (format) {
                timeFormat.value = format;
                if (videoPlayer.videoWidth && !isRecording) updatePreviewWatermark();
            }
        });
    });
    
    // 启用/禁用文字水印
    enableTextWatermark.addEventListener('change', () => {
        textSettings.style.display = enableTextWatermark.checked ? 'block' : 'none';
        if (videoPlayer.videoWidth && !isRecording) updatePreviewWatermark();
    });
    
    enableTimeWatermark.addEventListener('change', () => {
        if (videoPlayer.videoWidth && !isRecording) updatePreviewWatermark();
    });
    
    // 绑定所有滑块和输入事件
    function bindEvents(elements, callback) {
        elements.forEach(el => {
            if (el) {
                el.addEventListener('input', callback);
                el.addEventListener('change', callback);
            }
        });
    }
    
    const timeElements = [timeFormat, timeFontFamily, timeFontSize, timeTextColor, timeTextOpacity, timeBgColor, timeBgOpacity, timePosX, timePosY, timeRotate];
    const textElements = [customTextContent, textFontFamily, textFontSize, textTextColor, textTextOpacity, textBgColor, textBgOpacity, textPosX, textPosY, textRotate];
    
    const updateCallback = () => {
        if (videoPlayer.videoWidth && !isRecording) updatePreviewWatermark();
    };
    
    bindEvents(timeElements, updateCallback);
    bindEvents(textElements, updateCallback);
    
    // 显示数值
    timeTextOpacity.addEventListener('input', () => timeTextOpacityValue.textContent = parseFloat(timeTextOpacity.value).toFixed(2));
    timeBgOpacity.addEventListener('input', () => timeBgOpacityValue.textContent = parseFloat(timeBgOpacity.value).toFixed(2));
    timePosX.addEventListener('input', () => timePosXValue.textContent = timePosX.value + '%');
    timePosY.addEventListener('input', () => timePosYValue.textContent = timePosY.value + '%');
    timeRotate.addEventListener('input', () => timeRotateValue.textContent = timeRotate.value + '°');
    
    textTextOpacity.addEventListener('input', () => textTextOpacityValue.textContent = parseFloat(textTextOpacity.value).toFixed(2));
    textBgOpacity.addEventListener('input', () => textBgOpacityValue.textContent = parseFloat(textBgOpacity.value).toFixed(2));
    textPosX.addEventListener('input', () => textPosXValue.textContent = textPosX.value + '%');
    textPosY.addEventListener('input', () => textPosYValue.textContent = textPosY.value + '%');
    textRotate.addEventListener('input', () => textRotateValue.textContent = textRotate.value + '°');
    
    startTimeInput.addEventListener('change', () => {
        startDate = new Date(startTimeInput.value);
        if (videoPlayer.videoWidth && !isRecording) updatePreviewWatermark();
    });
    
    // 初始化
    initDateTimePicker();
    customTextContent.value = '公司内部资料';
    statusMsg.innerHTML = '📁 请选择视频文件';
    textSettings.style.display = 'none';
</script>
