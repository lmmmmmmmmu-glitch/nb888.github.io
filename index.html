<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>视频时间水印工具 - 自适应版 (裁剪+水印+录制)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #b8e1fc, #d4f1f9);
            min-height: 100vh;
            padding: 16px;
        }

        /* 自适应容器 - 移动端自动单列，大屏双列 */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            align-items: start;
        }

        /* 平板及更大屏幕采用双列布局 */
        @media (min-width: 900px) {
            body {
                padding: 24px;
            }
            .container {
                grid-template-columns: 1fr 1fr;
                gap: 24px;
            }
        }

        /* 超小屏幕进一步减小内边距 */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .panel-content {
                padding: 16px !important;
            }
            .panel-header {
                padding: 12px 16px !important;
            }
            .btn-group {
                flex-direction: column;
                gap: 8px;
            }
            .btn-group .btn {
                width: 100%;
            }
            .grid-2col {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .slider-group {
                flex-wrap: wrap;
            }
            .slider-group label {
                width: auto;
                min-width: 60px;
            }
            .color-row {
                flex-wrap: wrap;
            }
            .crop-toolbar {
                flex-direction: column;
                gap: 6px !important;
                bottom: 8px !important;
                left: 8px !important;
            }
            .crop-btn {
                padding: 4px 8px !important;
                font-size: 10px !important;
            }
            .crop-info {
                font-size: 10px !important;
                bottom: 4px !important;
                right: 6px !important;
            }
        }

        .panel {
            background: rgba(245, 250, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(100, 180, 250, 0.5);
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0, 80, 120, 0.2);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 18px 24px;
            background: linear-gradient(135deg, rgba(100, 180, 250, 0.25), rgba(150, 200, 255, 0.15));
            border-bottom: 1px solid rgba(70, 150, 230, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .panel-header h2 {
            font-size: 1.35rem;
            color: #1a6ea8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-buttons {
            display: flex;
            gap: 8px;
        }
        .btn-tiny {
            background: rgba(45, 140, 255, 0.15);
            border: 1px solid rgba(45, 140, 255, 0.5);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            color: #1a6ea8;
            transition: all 0.2s;
        }
        .btn-tiny:hover {
            background: rgba(45, 140, 255, 0.3);
            transform: translateY(-1px);
        }

        .panel-content {
            padding: 20px 24px;
            flex: 1;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 2px solid #4a9eff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #watermarkCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .crop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: crosshair;
        }
        .crop-box {
            position: absolute;
            border: 3px solid #2d8cff;
            background: rgba(45, 140, 255, 0.15);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
            cursor: move;
            transition: none;
        }
        .crop-box .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #2d8cff;
            border: 2px solid white;
            border-radius: 2px;
            z-index: 20;
        }
        .resize-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .resize-handle.n { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
        .resize-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .resize-handle.w { top: 50%; left: -6px; transform: translateY(-50%); cursor: w-resize; }
        .resize-handle.e { top: 50%; right: -6px; transform: translateY(-50%); cursor: e-resize; }
        .resize-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .resize-handle.s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
        .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
        .crop-info {
            position: absolute;
            bottom: 8px;
            right: 12px;
            background: rgba(0,0,0,0.75);
            color: #2d8cff;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 15;
            pointer-events: none;
            font-family: monospace;
        }
        .crop-toolbar {
            position: absolute;
            bottom: 12px;
            left: 12px;
            z-index: 15;
            display: flex;
            gap: 8px;
        }
        .crop-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #2d8cff;
            color: #2d8cff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .crop-btn:hover {
            background: #2d8cff;
            color: white;
        }
        .crop-active-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #2d8cffcc;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            z-index: 15;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .preview-modal.active { display: flex; }
        .preview-container {
            position: relative;
            width: 90vw;
            height: 90vh;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #4a9eff;
        }
        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .preview-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .close-preview {
            position: absolute;
            top: 20px;
            right: 30px;
            background: #ff5555;
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            z-index: 10010;
        }
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2d8cff, #6ab0ff);
            width: 0%;
        }
        .recording-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ff3b3b;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            animation: pulse 1s infinite;
            z-index: 25;
            color: white;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .form-row { margin-bottom: 16px; }
        .form-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #1a5f8c; display: block; }
        .form-control { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.9); border: 1px solid #7bb8e0; border-radius: 12px; font-size: 14px; }
        .slider-group { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .slider-group label { width: 70px; font-size: 13px; font-weight: 500; }
        input[type="range"] { flex: 1; min-width: 120px; height: 5px; background: #cce4ff; appearance: none; border-radius: 5px; }
        .range-value { width: 50px; text-align: center; color: #2d8cff; font-weight: 700; font-size: 13px; }
        .color-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .color-box { width: 48px; height: 38px; border-radius: 10px; border: 1px solid #7bb8e0; cursor: pointer; }
        .grid-2col { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
        .btn { flex: 1; padding: 10px 16px; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; background: linear-gradient(95deg, #eef5ff, #e0edfc); color: #1a6ea8; text-align: center; border: 1px solid #b8d6ff; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(95deg, #2d8cff, #4a9eff); color: white; border: none; }
        .btn-danger { background: linear-gradient(95deg, #ff6b6b, #ff5252); color: white; }
        .btn-success { background: linear-gradient(95deg, #4caf50, #45a049); color: white; }
        .btn-info { background: linear-gradient(95deg, #26a69a, #009688); color: white; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.02); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .divider { height: 1px; background: rgba(100,150,200,0.3); margin: 18px 0; }
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e3a5f; padding: 10px 28px; border-radius: 40px; color: white; z-index: 9999; opacity: 0; transition: opacity 0.2s; pointer-events: none; font-size: 14px; white-space: nowrap; }
        .toast-msg.show { opacity: 1; }
        .speed-group { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .speed-btn { flex: 1; background: #e0edfc; border-radius: 20px; padding: 6px 0; text-align: center; cursor: pointer; font-size: 13px; transition: 0.2s; min-width: 55px; }
        .speed-btn.active { background: #2d8cff; color: white; }
        .status-bar { margin-top: 15px; padding: 10px; border-radius: 6px; background: rgba(0,0,0,0.3); font-size: 13px; color: #d1d1d1; text-align: center; word-break: break-word; }
        .position-control { margin-bottom: 16px; padding: 8px; background: rgba(100,180,250,0.1); border-radius: 12px; }
        .align-buttons { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .input-group { display: flex; align-items: center; gap: 8px; margin-top: 6px; padding-left: 0; flex-wrap: wrap; }
        .input-group input { flex: 1; padding: 6px 10px; border-radius: 8px; border: 1px solid #7bb8e0; background: white; font-size: 13px; min-width: 80px; }
        @media (max-width: 600px) {
            .position-title { font-size: 14px; margin-bottom: 6px; }
            .input-group { padding-left: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="panel-header">
            <h2>🎬 视频预览 & 裁剪选择框</h2>
            <div class="config-buttons">
                <button id="exportConfigBtn" class="btn-tiny">📤 导出配置</button>
                <button id="importConfigBtn" class="btn-tiny">📥 导入配置</button>
                <input type="file" id="configFileInput" accept="application/json" style="display: none;">
            </div>
        </div>
        <div class="panel-content">
            <div class="video-wrapper" id="videoWrapper">
                <video id="videoElement" controls></video>
                <canvas id="watermarkCanvas"></canvas>
                <div class="crop-overlay" id="cropOverlay" style="display: none;">
                    <div class="crop-box" id="cropBox">
                        <div class="resize-handle nw"></div><div class="resize-handle n"></div><div class="resize-handle ne"></div>
                        <div class="resize-handle w"></div><div class="resize-handle e"></div>
                        <div class="resize-handle sw"></div><div class="resize-handle s"></div><div class="resize-handle se"></div>
                    </div>
                    <div class="crop-info" id="cropInfo">选择裁剪区域 (框内录取，框外删除)</div>
                    <div class="crop-toolbar">
                        <button class="crop-btn" id="applyCropBtn">✅ 确认裁剪</button>
                        <button class="crop-btn" id="cancelCropBtn">🗑️ 取消裁剪</button>
                        <button class="crop-btn" id="resetCropBtn">🔄 重置选择框</button>
                    </div>
                </div>
                <div class="recording-badge" id="recordingBadge">🔴 录制中</div>
                <div id="cropActiveBadge" class="crop-active-badge" style="display: none;">✂️ 裁剪生效中</div>
            </div>
            <div class="progress-area"><div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div></div>
            <div class="divider"></div>
            <div class="form-row"><label class="form-label">📅 起始时间</label><div class="grid-2col"><input type="datetime-local" id="startDateTime" class="form-control" step="1"><input type="number" id="timeOffset" value="0" class="form-control" placeholder="偏移(秒)"></div></div>
            <div class="form-row"><label class="form-label">📝 时间格式</label><select id="timeFormat" class="form-control"><option value="YYYY-MM-DD HH:mm:ss">2026-03-03 03:03:03</option><option value="YYYY/MM/DD HH:mm:ss">2026/03/03 03:03:03</option><option value="YYYY年MM月DD日 HH:mm:ss">2026年03月03日 03:03:03</option></select></div>
            <div class="form-row"><label class="form-label">🎨 时间水印样式</label><div class="grid-2col"><select id="fontFamily" class="form-control">
                <option value="Microsoft YaHei">微软雅黑</option>
                <option value="SimHei">黑体</option>
                <option value="SimSun">宋体</option>
                <option value="KaiTi">楷体</option>
                <option value="FangSong">仿宋</option>
                <option value="PingFang SC">苹方</option>
                <option value="思源黑体, Source Han Sans">思源黑体</option>
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Courier New">Courier New</option>
                <option value="Verdana">Verdana</option>
                <option value="Georgia">Georgia</option>
                <option value="Comic Sans MS">Comic Sans MS</option>
                <option value="Impact">Impact</option>
                <option value="Trebuchet MS">Trebuchet MS</option>
                <option value="Palatino Linotype">Palatino Linotype</option>
                <option value="Book Antiqua">Book Antiqua</option>
                <option value="Lucida Sans Unicode">Lucida Sans Unicode</option>
                <option value="Tahoma">Tahoma</option>
                <option value="Helvetica">Helvetica</option>
                <option value="Geneva">Geneva</option>
                <option value="sans-serif">通用无衬线体</option>
                <option value="serif">通用衬线体</option>
                <option value="monospace">等宽字体</option>
                <option value="cursive">手写体</option>
                <option value="fantasy">装饰体</option>
            </select><input type="color" id="fontColor" value="#ffffff" style="height:42px;"></div></div>
            <div class="slider-group"><label>字体大小</label><input type="range" id="fontSize" min="12" max="80" value="26"><span class="range-value" id="fontSizeVal">26</span></div>
            <div class="slider-group"><label>透明度</label><input type="range" id="fontOpacity" min="0" max="1" step="0.05" value="1"><span id="fontOpacityVal">1</span></div>
            <div class="color-row"><label>背景颜色</label><input type="color" id="bgColor" value="#000000" class="color-box"><span>透明度</span><input type="range" id="bgOpacity" min="0" max="1" step="0.05" value="0.5" style="width:100px;"><span id="bgOpacityVal">0.5</span></div>
            <div class="position-control"><div class="position-title">时间水印位置</div><div class="slider-group"><label>水平</label><input type="range" id="horizontalPos" min="0" max="1000" value="900"><span id="horizontalVal">90.0</span>%</div><div class="slider-group"><label>垂直</label><input type="range" id="verticalPos" min="0" max="1000" value="900"><span id="verticalVal">90.0</span>%</div><div class="input-group"><input type="number" id="horizontalNum" step="0.1" placeholder="0-100"><span>%</span></div><div class="input-group"><input type="number" id="verticalNum" step="0.1" placeholder="0-100"><span>%</span></div></div>
            <div class="slider-group"><label>旋转</label><input type="range" id="rotateAngle" min="-30" max="30" value="0"><span id="rotateVal">0</span>°</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header"><h2>✍️ 自定义水印 & 录制控制</h2></div>
        <div class="panel-content">
            <button id="enableCropBtn" class="btn btn-info" style="margin-bottom: 12px; width: 100%;">✂️ 开启裁剪选择框</button>
            <div class="form-row"><label>📝 自定义文字</label><input type="text" id="customText" class="form-control" value="视频水印"></div>
            <div class="form-row"><label>🎨 字体</label><select id="customFontFamily" class="form-control">
                <option value="Microsoft YaHei">微软雅黑</option>
                <option value="SimHei">黑体</option>
                <option value="SimSun">宋体</option>
                <option value="KaiTi">楷体</option>
                <option value="FangSong">仿宋</option>
                <option value="PingFang SC">苹方</option>
                <option value="思源黑体, Source Han Sans">思源黑体</option>
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Courier New">Courier New</option>
                <option value="Verdana">Verdana</option>
                <option value="Georgia">Georgia</option>
                <option value="Comic Sans MS">Comic Sans MS</option>
                <option value="Impact">Impact</option>
                <option value="Trebuchet MS">Trebuchet MS</option>
                <option value="Palatino Linotype">Palatino Linotype</option>
                <option value="Book Antiqua">Book Antiqua</option>
                <option value="Lucida Sans Unicode">Lucida Sans Unicode</option>
                <option value="Tahoma">Tahoma</option>
                <option value="Helvetica">Helvetica</option>
                <option value="Geneva">Geneva</option>
                <option value="sans-serif">通用无衬线体</option>
                <option value="serif">通用衬线体</option>
                <option value="monospace">等宽字体</option>
                <option value="cursive">手写体</option>
                <option value="fantasy">装饰体</option>
            </select></div>
            <div class="grid-2col"><div class="slider-group"><label>字体大小</label><input type="range" id="customFontSize" min="12" max="80" value="28"><span id="customFontSizeVal">28</span></div><input type="color" id="customFontColor" value="#ff0000"></div>
            <div class="slider-group"><label>透明度</label><input type="range" id="customFontOpacity" min="0" max="1" step="0.05" value="0.8"><span id="customFontOpacityVal">0.8</span></div>
            <div class="color-row"><label>背景色</label><input type="color" id="customBgColor" value="#000000"><span>透明度</span><input type="range" id="customBgOpacity" min="0" max="1" step="0.05" value="0.4"><span id="customBgOpacityVal">0.4</span></div>
            <div class="position-control"><div class="position-title">自定义水印位置</div><div class="slider-group"><label>水平</label><input type="range" id="customHorizontalPos" min="0" max="1000" value="100"><span id="customHorizontalVal">10.0</span>%</div><div class="slider-group"><label>垂直</label><input type="range" id="customVerticalPos" min="0" max="1000" value="100"><span id="customVerticalVal">10.0</span>%</div><div class="input-group"><input type="number" id="customHorizontalNum" step="0.1" placeholder="0-100"><span>%</span></div><div class="input-group"><input type="number" id="customVerticalNum" step="0.1" placeholder="0-100"><span>%</span></div></div>
            <div class="slider-group"><label>旋转</label><input type="range" id="customRotateAngle" min="-30" max="30" value="0"><span id="customRotateVal">0</span>°</div>
            <div class="align-buttons"><button id="alignHorizontalBtn" class="btn btn-info">水平对齐</button><button id="alignVerticalBtn" class="btn btn-info">垂直对齐</button><button id="alignBothBtn" class="btn btn-success">完全对齐</button></div>
            <div class="form-row"><label>导出格式</label><select id="exportFormat"><option>mp4</option><option>webm</option></select></div>
            <div class="speed-group"><label style="width:70px">速度</label><div class="speed-btn" data-speed="1">1x</div><div class="speed-btn" data-speed="2">2x</div><div class="speed-btn" data-speed="4">4x</div><div class="speed-btn" data-speed="8">8x</div></div>
            <button id="uploadBtn" class="btn btn-primary" style="width:100%">📁 选择视频</button>
            <input type="file" id="videoFile" accept="video/*" style="display:none">
            <div class="btn-group"><button id="previewBtn" class="btn btn-success">👁️ 预览效果</button><button id="recordBtn" class="btn btn-primary" disabled>🔴 录制</button><button id="stopBtn" class="btn btn-danger" disabled>⏹️ 停止</button><button id="exportBtn" class="btn" disabled>💾 导出</button></div>
            <div class="status-bar" id="statusBar">状态: 等待视频</div>
            <div>录制进度: <span id="recordTime">00:00:00</span><input type="range" id="recordProgress" min="0" max="100" value="0" disabled style="width:100%"></div>

    function drawWatermarks(ctxTarget, targetWidth, targetHeight, currentTime) { if(!targetWidth || !targetHeight) return; ctxTarget.clearRect(0, 0, targetWidth, targetHeight); if(video.readyState >= 2 && video.videoWidth) { if(currentCrop && currentCrop.w > 0 && currentCrop.h > 0) { ctxTarget.drawImage(video, currentCrop.x, currentCrop.y, currentCrop.w, currentCrop.h, 0, 0, targetWidth, targetHeight); } else { let vw = video.videoWidth, vh = video.videoHeight; let ratioW = targetWidth / targetHeight, ratioV = vw / vh; let dw, dh, dx, dy; if(ratioV > ratioW) { dw = targetWidth; dh = targetWidth / ratioV; dx = 0; dy = (targetHeight - dh) / 2; } else { dh = targetHeight; dw = targetHeight * ratioV; dx = (targetWidth - dw) / 2; dy = 0; } ctxTarget.drawImage(video, dx, dy, dw, dh); } } const timeDate = getWatermarkTime(currentTime); const timeStr = formatTime(timeDate, timeFormatSel.value); const tX = targetWidth * (parseFloat(horizontalRange.value)/10 / 100); const tY = targetHeight * (parseFloat(verticalRange.value)/10 / 100); drawSingle(ctxTarget, timeStr, tX, tY, { fontFamily: fontFamilySel.value, fontSize: parseInt(fontSizeRange.value), fontColor: fontColorPick.value, fontOpacity: parseFloat(fontOpacityRange.value), bgColor: bgColorPick.value, bgOpacity: parseFloat(bgOpacityRange.value), angle: parseInt(rotateRange.value) }); const cTxt = customTextInp.value.trim(); if(cTxt) { const cX = targetWidth * (parseFloat(customHorizontal.value)/10 / 100); const cY = targetHeight * (parseFloat(customVertical.value)/10 / 100); drawSingle(ctxTarget, cTxt, cX, cY, { fontFamily: customFontFamily.value, fontSize: parseInt(customFontSize.value), fontColor: customFontColor.value, fontOpacity: parseFloat(customFontOpacity.value), bgColor: customBgColor.value, bgOpacity: parseFloat(customBgOpacity.value), angle: parseInt(customRotate.value) }); } }

    function loadVideo(file) { if(currentVideoUrl) URL.revokeObjectURL(currentVideoUrl); currentVideoUrl = URL.createObjectURL(file); video.src = currentVideoUrl; video.onloadedmetadata = () => { originalVideoWidth = video.videoWidth; originalVideoHeight = video.videoHeight; resizeCanvasByCrop(); video.playbackRate = currentPlaybackRate; statusBar.innerText = `已加载: ${file.name}`; recordBtn.disabled = false; exportBtn.disabled = true; drawMainWatermarks(); }; video.ontimeupdate = () => drawMainWatermarks(); if(isRecording) stopRecording(); recordedChunks = []; }
    function startRecording() { if(!video.src){showToast("请先选择视频");return;} if(isRecording) return; recordedChunks = []; isRecording = true; video.currentTime = 0; video.playbackRate = currentPlaybackRate; recordBtn.disabled = true; stopBtn.disabled = false; exportBtn.disabled = true; recordingBadge.style.display = 'block'; let canvasStream = canvas.captureStream(30); let audioStream = null; try{ audioStream = video.captureStream ? video.captureStream() : null; } catch(e){} let finalStream = canvasStream; if(audioStream && audioStream.getAudioTracks().length) finalStream.addTrack(audioStream.getAudioTracks()[0]); let mimeType = exportFormatSelect.value === 'mp4' ? 'video/mp4; codecs=avc1,mp4a' : 'video/webm; codecs=vp9,opus'; if(!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm'; mediaRecorder = new MediaRecorder(finalStream, { mimeType }); mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); }; mediaRecorder.onstop = () => { isRecording = false; recordBtn.disabled = false; stopBtn.disabled = true; exportBtn.disabled = false; recordingBadge.style.display = 'none'; statusBar.innerText = '录制完成'; showToast('录制完成'); if(window._progInt) clearInterval(window._progInt); if(window._recTimer) clearInterval(window._recTimer); }; mediaRecorder.start(); function drawFrame() { if(!isRecording) return; drawWatermarks(ctx, canvas.width, canvas.height, video.currentTime); animationFrame = requestAnimationFrame(drawFrame); } drawFrame(); let duration = video.duration; window._progInt = setInterval(() => { if(video.currentTime >= duration - 0.05 && isRecording) stopRecording(); let percent = (video.currentTime / duration) * 100; progressFill.style.width = `${percent}%`; }, 100); window._recTimer = setInterval(() => { let elapsed = Math.floor(video.currentTime); let hh = String(Math.floor(elapsed / 3600)).padStart(2,'0'); let mm = String(Math.floor((elapsed % 3600) / 60)).padStart(2,'0'); let ss = String(elapsed % 60).padStart(2,'0');     allInputs.forEach(i => i.addEventListener('input',()=>drawMainWatermarks()));
    let now = new Date(); now.setSeconds(0); startDateTimeInput.value = now.toISOString().slice(0,16); timeOffsetInp.value = 0; setPlaybackSpeed(1); horizontalRange.value = 900; verticalRange.value = 900; customHorizontal.value = 100; customVertical.value = 100; if(horizontalNum) horizontalNum.value = '90.0'; if(verticalNum) verticalNum.value = '90.0'; if(customHorizontalNum) customHorizontalNum.value = '10.0'; if(customVerticalNum) customVerticalNum.value = '10.0'; currentCrop = null; initCropInteractions(); showToast("工具已启动 | 自适应手机/电脑布局 | 支持裁剪与配置导入导出");
</script>
